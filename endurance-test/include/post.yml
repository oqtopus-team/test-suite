desc: Register, upload, submit a job
vars:
  user_api_endpoint: "{{ parent.vars.user_api_endpoint }}"
  q_api_token: "{{ parent.vars.q_api_token }}"
  device_id: "{{ parent.vars.device_id }}"
  job_name: "{{ parent.vars.job_name }}"
  job_type: "{{ parent.vars.job_type }}"
  transpiler_info: "{{ parent.vars.transpiler_info ?? {} }}"
  shots: "{{ parent.vars.shots }}"
  input_payload_path: "{{ parent.vars.input_payload_path }}"
  mitigation_info: "{{ parent.vars.mitigation_info ?? {} }}"
  simulator_info: "{{ parent.vars.simulator_info ?? {} }}"
runners:
  req: "{{ parent.vars.user_api_endpoint }}"
if: included
steps:
  device:
    dump:
      expr: vars.device_id + " is selected"
  register:
    desc: Register a job
    req:
      /jobs:
        post:
          headers:
            q-api-token: "{{ vars.q_api_token }}"
          body:
            application/json: {}
    test: |
      current.res.status == 200
  upload:
    desc: Upload input.zip
    exec:
      command: |
        curl -sS -o /dev/null -w '%{http_code}' \
          -X POST \
          -F 'key={{ steps.register.res.body.presigned_url.fields.key }}' \
          -F 'AWSAccessKeyId={{ steps.register.res.body.presigned_url.fields.AWSAccessKeyId }}' \
          -F 'policy={{ steps.register.res.body.presigned_url.fields.policy }}' \
          -F 'signature={{ steps.register.res.body.presigned_url.fields.signature }}' \
          -F 'file=@{{ vars.input_payload_path }}' \
          '{{ steps.register.res.body.presigned_url.url }}'
    test: |
      current.exit_code == 0
      && (current.stdout == "200" || current.stdout == "201" || current.stdout == "204")
  submit:
    desc: Submit a job
    req:
      /jobs/{{ steps.register.res.body.job_id }}/submit:
        post:
          headers:
            q-api-token: "{{ vars.q_api_token }}"
          body:
            application/json:
              description: "description of {{ vars.job_name }}"
              device_id: "{{ vars.device_id }}"
              job_type: "{{ vars.job_type }}"
              name: "{{ vars.job_name }}"
              shots: "{{ vars.shots }}"
              transpiler_info: "{{ vars.transpiler_info }}"
              mitigation_info: "{{ vars.mitigation_info }}"
              simulator_info: "{{ vars.simulator_info }}"
    test: |
      current.res.status == 200
  message:
    desc: Dump the state
    dump:
      expr: '"[" + now().Format("2006-01-02 15:04:05") + "]" + steps.register.res.body.job_id + "(" + vars.job_name + ") is submitted"'
  wait:
    desc: Check job status
    loop:
      count: 20
      until: 'current.res.body.status  == "succeeded" || current.res.body.status  == "failed" || current.res.body.status == "cancelled"'
      minInterval: 1
      maxInterval: 1
    req:
      /jobs/{{steps.register.res.body.job_id}}:
        get:
          headers:
            q-api-token: "{{ vars.q_api_token }}"
    dump:
      expr: '"[" + now().Format("2006-01-02 15:04:05") + "]" + steps.register.res.body.job_id + "(" + vars.job_name + ") is in " + current.res.body.status'
