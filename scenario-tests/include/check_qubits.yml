desc: check required qubits are available in device
vars:
  used_qubits: "{{ parent.vars.used_qubits }}"
if: included
steps:
  check:
    desc: verify required qubits are available using jq
    exec:
      command: |
        used=$(echo '{{vars.used_qubits}}' | sed 's/ /,/g')
        jq -e --argjson used "$used" \
          '.qubit_ids as $ids | $used | all(. as $q | $ids | any(. == $q))' \
          .tmp_info/available_qubits.json
    test: |
      current.exit_code == 0
