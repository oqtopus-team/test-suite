desc: Post a job and wait
vars:
  user_api_endpoint: "{{ parent.params.user_api_endpoint }}"
  q_api_token: "{{ parent.params.q_api_token }}"
  device_id: "{{ parent.params.device_id }}"
  job_name: "{{ parent.params.job_name }}"
  job_type: "{{ parent.params.job_type }}"
  transpiler_info: "{{ parent.params.transpiler_info }}"
  shots: "{{ parent.params.shots }}"
  program: "{{ parent.params.program }}"
runners:
  req: "{{ parent.params.user_api_endpoint }}"
if: included
steps:
  post:
    desc: Post a job
    req:
      /v1/jobs:
        post:
          headers:
            q-api-token: "{{ vars.q_api_token }}"
          body:
            application/json:
              description: "description of {{ vars.job_name }}"
              device_id: "{{ vars.device_id }}"
              job_info:
                program:
                  - "{{ vars.program }}"
              job_type: "{{ vars.job_type }}"
              name: "{{ vars.job_name }}"
              shots: "{{ vars.shots }}"
              transpiler_info: "{{ vars.transpiler_info }}"
    test: |
      current.res.status == 200
  message:
    desc: Dump the state
    dump:
      expr: steps.post.res.body.job_id + "(" + vars.job_name + ") is posted"
  wait:
    desc: Check job status
    loop:
      count: 20
      until: 'current.res.body.status  == "succeeded" || current.res.body.status  == "failed" || current.res.body.status == "canceled"'
      minInterval: 5
      maxInterval: 10
    req:
      /v1/jobs/{{steps.post.res.body.job_id}}:
        get:
          headers:
            q-api-token: "{{ vars.q_api_token }}"
    dump:
      expr: steps.post.res.body.job_id + "(" + vars.job_name + ") is in " + current.res.body.status
 