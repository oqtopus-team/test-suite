desc: sampling job with custom transpiler
steps:
  test-sampling-job-with-custom-transpiler:
    desc: sampling job with custom transpiler
    include:
      path: ../runn-included/sampling-included.yml
      vars:
        job_name: sampling-job-with-custom-transpiler
        program:
          - |
            OPENQASM 3;
            include "stdgates.inc";
            qubit[2] q;
            bit[2] c;
            h q[0];
            cx q[0],q[1];
            c = measure q;
        transpiler_info:
          transpiler_lib: qiskit
          transpiler_options:
            initial_layout: [0, 1]
        expected_status: "succeeded"
        expected_transpiler_lib: qiskit
        expected_transpiler_options:
          initial_layout: [0, 1]
