desc: sampling job with default transpiler
vars:
steps:
  test-sampling-with-default-transpiler:
    include:
      path: sampling-included.yml
      vars:
        job_name: sampling-job-with-default-transpiler
        template_file: sampling-default-transpiler.json.template
        program:
          - |
            OPENQASM 3;
            include "stdgates.inc";
            qubit[2] q;
            bit[2] c;
            h q[0];
            cx q[0],q[1];
            c = measure q;
        expected_status: "succeeded"
        expected_transpiler_lib: qiskit
        expected_transpiler_options:
          optimization_level: 1
