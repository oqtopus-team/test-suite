desc: sampling job with Qiskit transpiler
steps:
  test-sampling-job-with-qiskit-transpiler:
    desc: sampling job with qiskit transpiler
    include:
      path: sampling-included.yml
      vars:
        job_name: sampling-job-with-qiskit-transpiler
        expected_program: |
          OPENQASM 3;
          include "stdgates.inc";
          qubit[2] q;
          bit[2] c;
          h q[0];
          cx q[0],q[1];
          c = measure q;
        expected_transpiler_info:
          transpiler_lib: qiskit
          transpiler_options:
            optimization_level: 1
        expected_status: "succeeded"
