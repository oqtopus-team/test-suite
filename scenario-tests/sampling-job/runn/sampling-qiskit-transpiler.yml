desc: Sampling Job with Qiskit transpiler
steps:
  test-qiskit:
    desc: run Bell Circuit
    include:
      path: sampling-included.yml
      vars:
        job_name: sampling-job-with-qiskit-transpiler
        program: >-
          OPENQASM 3;
          include "stdgates.inc";
          qubit[2] q;
          bit[2] c;
          h q[0];
          cx q[0],q[1];
          c = measure q;
        transpiler_info:
          transpiler_lib: qiskit
          transpiler_options:
            optimization_level: 2
        expected_status: "succeeded"
        expected_transpiler_lib: qiskit
        expected_transpiler_options:
          optimization_level: 2
  