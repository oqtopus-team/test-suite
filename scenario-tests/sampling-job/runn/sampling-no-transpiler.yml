desc: sampling job without transpiler
vars:
steps:
  test-no-transpiler:
    include:
      path: sampling-included.yml
      vars:
        job_name: sampling-job-without-transpiler
        program: >-
            OPENQASM 3;
            include "stdgates.inc";
            qubit[2] q;
            bit[2] c;
            cx q[0],q[1];
            c = measure q;
        transpiler_info:
          transpiler_lib: null
        expected_status: "succeeded"
        expected_transpiler_lib: null
        expected_transpiler_options: null

