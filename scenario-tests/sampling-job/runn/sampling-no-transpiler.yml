desc: sampling job without transpiler
vars:
  used_qubits: "0 1"
steps:
  check_qubits:
    include:
      path: ../../include/check_qubits.yml
      vars:
        used_qubits: "{{vars.used_qubits}}"
  test-no-transpiler:
    include:
      path: sampling-included.yml
      vars:
        job_name: sampling-job-no-transpiler
        template_file: sampling-no-transpiler.json.template
        program:
          - |
            OPENQASM 3;
            include "stdgates.inc";
            qubit[2] q;
            bit[2] c;
            cx q[0],q[1];
            c = measure q;
        transpiler_info:
          transpiler_lib: null
        expected_status: "succeeded"
        expected_transpiler_lib: null
        expected_transpiler_options: null
