desc: Sampling Job - Succeeded
vars:
  user_api_endpoint: ${USER_API_ENDPOINT}
  q_api_token: ${Q_API_TOKEN}
  device_id: ${DEVICE_ID}
  job_name: sampling-job-succeeded
  job_type: sampling
  shots: 1000
  program: >-
    OPENQASM 3;
    include "stdgates.inc";
    qubit[2] q;
    bit[2] c;
    h q[0];
    cx q[0],q[1];
    c = measure q;
  transpiler_info:
    transpiler_lib: qiskit
    transpiler_options:
      optimization_level: 2
runners:
  post_and_wait:
    path: ../../custom-runn/post-and-wait.yml
    params:
      user_api_endpoint: "{{ vars.user_api_endpoint }}"
      q_api_token: "{{ vars.q_api_token }}"
      device_id: "{{ vars.device_id }}"
      job_name: "{{ vars.job_name }}"
      job_type: "{{ vars.job_type }}"
      shots: "{{ vars.shots }}"
      program: "{{ vars.program }}"
      transpiler_info: "{{ vars.transpiler_info }}"
steps:
  post_and_wait:
    post_and_wait:
      desc: Post a sampling job and wait
  bind:
    bind:
      body: steps.post_and_wait.steps.wait.res.body
  test:
    test: |
      body.status == "succeeded"
      && body.job_id != null
      && body.job_id == steps.post_and_wait.steps.post.res.body.job_id
      && body.name == vars.job_name
      && body.description == "description of " + vars.job_name
      && body.device_id == vars.device_id
      && body.shots == vars.shots
      && body.job_type == vars.job_type
      && body.job_info != null
      && body.job_info.program != null
      && len(body.job_info.program) == 1
      && body.job_info.program[0] == vars.program
      && body.transpiler_info != null
      && body.transpiler_info.transpiler_lib == "qiskit"
      && body.transpiler_info.transpiler_options != null
      && body.transpiler_info.transpiler_options.optimization_level == 2
      && body.job_info.result != null
      && body.job_info.result.sampling != null
      && body.job_info.result.sampling.counts != null
      && body.job_info.transpile_result.transpiled_program != null
      && body.job_info.transpile_result.stats != null
      && body.job_info.transpile_result.virtual_physical_mapping != null
      && body.simulator_info == null
      && body.mitigation_info == null
      && body.execution_time != null
      && body.execution_time > 0
      && body.submitted_at != null
      && body.ready_at != null
      && body.running_at != null
      && body.ended_at != null
      && date(body.submitted_at) <= date(body.ready_at)
      && date(body.ready_at) <= date(body.running_at)
      && date(body.running_at) <= date(body.ended_at)
