desc: custom gate job with mitigation
vars:
steps:
  test-bell-mitigation:
    include:
      path: sampling-included.yml
      vars:
        job_name: custom-gate-job-mitigation
        program:
          - |
            OPENQASM 3;
            include "stdgates.inc";

            qubit[2] q;
            bit[2] c;

            gate bell a, b {
                h a;
                cx a, b;
            }

            bell q[0], q[1];
            c = measure q;
        mitigation_info:
          ro_error_mitigation: pseudo_inverse
        expected_status: succeeded
        expected_transpiler_lib: qiskit
        expected_transpiler_options:
          optimization_level: 1
