desc: sampling job with Qiskit transpiler and mitigiation
vars:
steps:
  test-sampling-job-with-qiskit-and-mitigation:
    include:
      path: sampling-included.yml
      vars:
        job_name: sampling-job-with-qiskit-and-mitigation
        program:
          - |
            OPENQASM 3;
            include "stdgates.inc";
            qubit[2] q;
            bit[2] c;
            h q[0];
            cx q[0],q[1];
            c = measure q;
        mitigation_info:
          ro_error_mitigation: pseudo_inverse
        expected_status: "succeeded"
        expected_transpiler_lib: qiskit
        expected_transpiler_options:
          optimization_level: 1
