desc: sampling job with invalid QASM
steps:
  test-sampling-job-with-invalid-qasm:
    desc: sampling job with invalid QASM
    include:
      path: sampling-failed-included.yml
      vars:
        job_name: sampling-job-with-invalid-qasm
        input_payload_path: payloads/sampling-invalid-qasm.zip
        program:
          - |
            OPENQASM 3;
            include "stdgates.inc";
            quit[2] q;
            bit[2] c;
            h q[0];
            cx q[0],q[1];
            c = measure q;
        transpiler_info:
          transpiler_lib: qiskit
          transpiler_options:
            optimization_level: 1
        expected_status: "failed"
        expected_transpiler_lib: qiskit
        expected_transpiler_options:
          optimization_level: 1
        expected_transpile_result_present: false
