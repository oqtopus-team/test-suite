desc: Sampling Job
vars:
  bell_program: >-
    OPENQASM 3;
    include "stdgates.inc";
    qubit[2] q;
    bit[2] c;
    h q[0];
    cx q[0],q[1];
    c = measure q;
  cx_program: >-
    OPENQASM 3;
    include "stdgates.inc";
    qubit[2] q;
    bit[2] c;
    cx q[0],q[1];
    c = measure q;
steps:
  test-qiskit:
    include:
      path: sampling-included.yml
      vars:
        job_name: sampling-job-qiskit
        program: "{{ vars.bell_program }}"
        transpiler_info:
          transpiler_lib: qiskit
          transpiler_options:
            optimization_level: 2
        expected_status: "succeeded"
        expected_transpiler_lib: qiskit
        expected_transpiler_options:
          optimization_level: 2
  test-no-transpiler:
    include:
      path: sampling-included.yml
      vars:
        job_name: sampling-job-no-transpiler
        program: "{{ vars.cx_program }}"
        transpiler_info:
          transpiler_lib: null
        expected_status: "succeeded"
        expected_transpiler_lib: null
        expected_transpiler_options: null