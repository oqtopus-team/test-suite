desc: get devices (also for health check)
runners:
  req: ${USER_API_ENDPOINT}
steps:
  get:
    desc: get devices
    req:
      /devices:
        get:
          headers:
            q-api-token: ${Q_API_TOKEN}
    test: |
      current.res.status == 200
  message:
    desc: some devices are registered
    dump:
      expr: 'string(len(steps.get.res.body)) + " devices are registered"'
