version: "3"
tasks:
  payload-zip:
    desc: "build one payload zip from payloads/<name>.json"
    requires:
      vars: [PAYLOAD]
    cmds:
      - |
        set -eu
        cd payloads
        test -f "{{.PAYLOAD}}.json"
        zip -jq "{{.PAYLOAD}}.zip" "{{.PAYLOAD}}.json"
  payload-zip-all:
    desc: "build all payload zips from payloads/*.json"
    cmds:
      - |
        set -eu
        cd payloads
        for f in *.json; do
          zip -jq "${f%.json}.zip" "$f"
        done
  runn-device:
    desc: "get devices for also health check"
    vars:
      DUMP: '{{default "false" .DUMP}}'
    cmds:
      - runn run device/runn/device.yml --env-file .env --verbose --scopes run:exec --var dump_request:{{.DUMP}}
  runn-list:
    desc: "list up runn list"
    cmds:
      - runn list */runn/*.yml --scopes read:parent
  runn-id:
    desc: "runn with runnbook id"
    vars:
      DUMP: '{{default "false" .DUMP}}'
    cmds:
      - runn run */runn/*.yml --env-file .env --id {{.CLI_ARGS}} --verbose --scopes read:parent,run:exec --var dump_request:{{.DUMP}}
  runn-id-stress:
    desc: "runn with runnbook id (stress test)"
    cmds:
      - runn loadt --concurrent on --load-concurrent 32 */runn/*.yml --env-file .env --id {{.CLI_ARGS}} --scopes read:parent,run:exec
  runn-all:
    desc: "runn all tests sequentially"
    vars:
      DUMP: '{{default "false" .DUMP}}'
    cmds:
      - runn run */runn/*.yml --env-file .env --verbose --fail-fast --scopes read:parent,run:exec --var dump_request:{{.DUMP}}
  runn-all-con:
    desc: "runn all tests concurrently"
    vars:
      DUMP: '{{default "false" .DUMP}}'
    cmds:
      - runn run */runn/*.yml --env-file .env --concurrent 8 --scopes read:parent,run:exec --var dump_request:{{.DUMP}}
