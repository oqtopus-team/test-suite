version: '3'
tasks:
  runn-list:
    desc: "list up runn list"
    cmds:
      - runn list */runn/*.yml --scopes read:parent
  runn-id:
    desc: "runn with runnbook id"
    cmds:
      - runn run */runn/*.yml --env-file .env --id {{.CLI_ARGS}} --verbose --scopes read:parent
  runn-all:
    desc: "runn all tests sequentially"
    cmds:
      - runn run */runn/*.yml --env-file .env --verbose --scopes read:parent
  runn-all-con:
    desc: "runn all tests concurrently"
    cmds:
      - runn run */runn/*.yml --env-file .env --concurrent 8 --scopes read:parent
