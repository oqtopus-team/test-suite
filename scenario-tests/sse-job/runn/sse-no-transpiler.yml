desc: SSE job without transpiler
vars:
  used_qubits: "0 1"
steps:
  check_qubits:
    include:
      path: ../../runn-included/check_qubits.yml
      vars:
        used_qubits: "{{vars.used_qubits}}"
  test-sse:
    include:
      path: ../runn-included/sse-included.yml
      vars:
        device_id: ${DEVICE_ID}
        job_name: sse-no-transpiler
        template_file: sse-no-transpiler.json.template
        expected_status: "succeeded"
        expected_transpiler_lib: null
        expected_transpiler_options: null
        expected_transpiled: false
        expected_execution_time_filled: true
