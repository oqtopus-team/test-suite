desc: SSE job
vars:
steps:
  test-sse:
    include:
      path: ../runn-included/sse-included.yml
      vars:
        device_id: ${DEVICE_ID}
        job_name: sse-job-with-qiskit-transpiler
        template_file: sse-qiskit-transpiler.json.template
        expected_status: "succeeded"
        expected_transpiler_lib: qiskit
        expected_transpiler_options:
          optimization_level: 1
        expected_transpiled: true
        expected_execution_time_filled: true
