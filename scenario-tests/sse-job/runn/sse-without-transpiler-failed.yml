desc: SSE job without transpiler failed
vars:
steps:
  test-sse:
    include:
      path: sse-included.yml
      vars:
        device_id: ${DEVICE_ID}
        job_name: sse-without-transpiler-failed
        input_payload_path: payloads/sse-without-transpiler-failed.zip
        expected_status: "failed"
        expected_transpiler_lib: null
        expected_transpiler_options: null
        expected_transpiled: false
        expected_execution_time_filled: true
        expected_result_present: false
        expected_sse_log_present: false
