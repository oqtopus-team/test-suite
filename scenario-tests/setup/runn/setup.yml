desc: setup before all the scenario tests
runners:
  req: ${USER_API_ENDPOINT}
steps:
  cleanup:
    include:
      path: ../../runn-included/cleanup.yml
  get_devices:
    desc: get devices
    req:
      /devices:
        get:
          headers:
            q-api-token: ${Q_API_TOKEN}
    test: |
      current.res.status == 200
    bind:
      device_info_json: find(steps.get_devices.res.body, {.device_id == "${DEVICE_ID}"}).device_info
      n_qubits: find(steps.get_devices.res.body, {.device_id == "${DEVICE_ID}"}).n_qubits
  message:
    desc: some devices are registered
    dump:
      expr: 'string(len(steps.get_devices.res.body)) + " devices are registered"'
  write_temp_device_info:
    desc: write device_info to temp file
    exec:
      command: |
        mkdir -p .tmp_info
        device_info='{{ device_info_json }}'
        if printf '%s' "$device_info" | grep -Eq '^(https?|file)://'; then
          curl -fsSL "$device_info" -o .tmp_info/device_info.json
        elif [ -n "$device_info" ] && [ "$device_info" != "null" ]; then
          cat > .tmp_info/device_info.json << 'EOF'
        {{ device_info_json }}
        EOF
        else
          printf '{}' > .tmp_info/device_info.json
        fi
    test: |
      current.exit_code == 0
  save_qubit_ids:
    desc: save available qubit IDs to temp text file
    exec:
      command: |
        if jq -e 'has("qubits") and (.qubits | length > 0)' .tmp_info/device_info.json >/dev/null; then
          jq -r '.qubits[].id' .tmp_info/device_info.json > .tmp_info/available_qubits.txt
        else
          seq 0 $(({{ n_qubits }} - 1)) > .tmp_info/available_qubits.txt
        fi
        cat .tmp_info/available_qubits.txt
        rm .tmp_info/device_info.json
    test: |
      current.exit_code == 0
