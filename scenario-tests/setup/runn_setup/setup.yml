desc: setup before all the scenario tests
runners:
  req: ${USER_API_ENDPOINT}
steps:
  cleanup:
    include:
      path: ../../runn-included/cleanup.yml
  check_api_token:
    desc: check if Q_API_TOKEN is valid
    req:
      /devices:
        get:
          headers:
            q-api-token: ${Q_API_TOKEN}
    test: |
      current.res.status != 401 && current.res.status != 403
  get_devices:
    desc: get devices
    req:
      /devices:
        get:
          headers:
            q-api-token: ${Q_API_TOKEN}
    test: |
      current.res.status == 200
    bind:
      device_info_json: find(steps.get_devices.res.body, {.device_id == "${DEVICE_ID}"}).device_info
      n_qubits: find(steps.get_devices.res.body, {.device_id == "${DEVICE_ID}"}).n_qubits
  message:
    desc: some devices are registered
    dump:
      expr: 'string(len(steps.get_devices.res.body)) + " devices are registered"'
  write_temp_device_info:
    desc: write device_info to temp file
    exec:
      command: |
        mkdir -p .tmp_info
        device_info='{{ device_info_json }}'
        if printf '%s' "$device_info" | grep -Eq '^(https?|file)://'; then
          curl -fsSL "$device_info" -o .tmp_info/device_info.json
        elif [ -n "$device_info" ] && [ "$device_info" != "null" ]; then
          cat > .tmp_info/device_info.json << 'EOF'
        {{ device_info_json }}
        EOF
        else
          printf '{}' > .tmp_info/device_info.json
        fi
    test: |
      current.exit_code == 0
  save_qubit_ids:
    desc: save available qubit IDs to temp text file
    exec:
      command: |
        if jq -e 'has("qubits") and (.qubits | length > 0)' .tmp_info/device_info.json >/dev/null; then
          jq -r '.qubits[].id' .tmp_info/device_info.json > .tmp_info/available_qubits.txt
        else
          seq 0 $(({{ n_qubits }} - 1)) > .tmp_info/available_qubits.txt
        fi
        cat .tmp_info/available_qubits.txt
    test: |
      current.exit_code == 0
  measure_error_rate:
    desc: measure device error rates
    exec:
      command: |
        threshold="${ERROR_RATE_THRESHOLD:-0.4}"
        eval "$(jq -r '
          "gate1=\(if has("qubits") then [.qubits[]? | 1 - .fidelity] else [] end | max // 0)",
          "readout=\(if has("qubits") then [.qubits[]?.meas_error.readout_assignment_error] else [] end | max // 0)",
          "gate2=\(if has("couplings") then [.couplings[]? | 1 - .fidelity] else [] end | max // 0)"
        ' .tmp_info/device_info.json)"
        max=$(jq -n -r "[$gate1, $readout, $gate2] | max")
        awk -v g1="$gate1" -v ro="$readout" -v g2="$gate2" -v m="$max" -v t="$threshold" 'BEGIN {
          printf "measured error rates (threshold: %s):\n", t
          printf "  1-qubit gate error (max): %.6g\n", g1
          printf "  readout error (max):      %.6g\n", ro
          printf "  2-qubit gate error (max): %.6g\n", g2
          printf "  -> overall max:           %.6g\n", m
        }'
    test: |
      current.exit_code == 0
  report_error_rate:
    desc: report measured error rates
    dump:
      expr: steps.measure_error_rate.stdout
  check_error_rate:
    desc: fail when any device error rate reaches the threshold (default 0.4)
    exec:
      command: |
        threshold="${ERROR_RATE_THRESHOLD:-0.4}"
        max=$(jq '[
          (.qubits[]?    | 1 - .fidelity),
          (.qubits[]?.meas_error.readout_assignment_error),
          (.couplings[]? | 1 - .fidelity)
        ] | max // 0' .tmp_info/device_info.json)
        rm .tmp_info/device_info.json
        awk -v m="$max" -v t="$threshold" 'BEGIN { exit !(m < t) }'
    test: |
      current.exit_code == 0
