desc: setup before all the scenario tests
runners:
  req: ${USER_API_ENDPOINT}
steps:
  cleanup:
    include:
      path: ../../runn-included/cleanup.yml
  check_api_token:
    desc: check if Q_API_TOKEN is valid
    req:
      /devices:
        get:
          headers:
            q-api-token: ${Q_API_TOKEN}
    test: |
      current.res.status != 401 && current.res.status != 403
  get_devices:
    desc: get devices
    req:
      /devices:
        get:
          headers:
            q-api-token: ${Q_API_TOKEN}
    test: |
      current.res.status == 200
    bind:
      device_info_json: find(steps.get_devices.res.body, {.device_id == "${DEVICE_ID}"}).device_info
  message:
    desc: some devices are registered
    dump:
      expr: 'string(len(steps.get_devices.res.body)) + " devices are registered"'
  write_temp_device_info:
    desc: write device_info to temp file
    exec:
      command: |
        mkdir -p .tmp_info
        cat > .tmp_info/device_info.json << 'EOF'
        {{ device_info_json }}
        EOF
    test: |
      current.exit_code == 0
  save_qubit_ids:
    desc: save available qubit IDs to temp text file
    exec:
      command: |
        jq -r '.qubits[].id' .tmp_info/device_info.json > .tmp_info/available_qubits.txt
        cat .tmp_info/available_qubits.txt
    test: |
      current.exit_code == 0
  check_error_rate:
    desc: fail when any device error rate reaches the threshold (default 0.4)
    exec:
      command: |
        threshold="${ERROR_RATE_THRESHOLD:-0.4}"
        max=$(jq '[
          (.qubits[]    | 1 - .fidelity),
          (.qubits[].meas_error.readout_assignment_error),
          (.couplings[] | 1 - .fidelity)
        ] | max' .tmp_info/device_info.json)
        echo "max error rate: $max (threshold: $threshold)"
        rm .tmp_info/device_info.json
        awk -v m="$max" -v t="$threshold" 'BEGIN { exit !(m < t) }'
    test: |
      current.exit_code == 0
