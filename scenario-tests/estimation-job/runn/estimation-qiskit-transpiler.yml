desc: estimation job
steps:
  test-estimation-job-with-qiskit-transpiler:
    desc: estimation job
    include:
      path: ../runn-included/estimation-included.yml
      vars:
        job_name: estimation-job-with-qiskit-transpiler
        template_file: estimation-qiskit-transpiler.json.template
        program:
          - |
            OPENQASM 3;
            include "stdgates.inc";
            qubit[2] q;
            bit[2] c;
            h q[0];
            cx q[0],q[1];
            c = measure q;
        operator:
          - { "pauli": "X 0 X 1", "coeff": 1.5 }
          - { "pauli": "Y 0 Z 1", "coeff": 1.2 }
        expected_status: "succeeded"
        expected_transpiler_lib: qiskit
        expected_transpiler_options:
          optimization_level: 1
