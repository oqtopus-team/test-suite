version: '3'

tasks:
  serve:
    desc: "Copy asset and serve docs"
    cmds:
      - cp -r asset docs
      - cp -r scenario-tests/asset docs/scenario-tests
      - uv run mkdocs serve

  scan-secrets:
    desc: "Scan the full Git history for leaked secrets using gitleaks"
    cmds:
      - gitleaks detect --source . --redact --no-banner
