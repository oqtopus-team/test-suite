name: Scenario Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"
  pull_request:

jobs:
  run-scenario-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./scenario-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull runn image
        run: docker pull ghcr.io/k1low/runn:v1.0.0

      - name: Run all scenario tests
        env:
          USER_API_ENDPOINT: ${{ secrets.USER_API_ENDPOINT }}
          Q_API_TOKEN: ${{ secrets.Q_API_TOKEN }}
          DEVICE_ID: ${{ secrets.DEVICE_ID }}
        run: docker run --rm -v $(pwd):/work -w /work -e USER_API_ENDPOINT -e Q_API_TOKEN -e DEVICE_ID ghcr.io/k1low/runn:v1.0.0 run */runn/*.yml --verbose --fail-fast --scopes read:parent

      - name: Slack Notification
        if: always() && github.event_name == 'schedule'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: Scenario Test ${{ job.status == 'success' && 'Succeeded' || 'Failed' }}
          SLACK_MESSAGE: The scheduled scenario test has ${{ job.status == 'success' && 'succeeded' || 'failed' }}
