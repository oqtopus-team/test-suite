name: Scenario Test

on:
  workflow_dispatch:
  pull_request:
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
        description: "Git ref of oqtopus-team/test-suite to check out (defaults to the SHA of the triggering event)"
      device_id:
        type: string
        required: false
        description: "Device ID to target (defaults to vars.DEVICE_ID)"
    secrets:
      USER_API_ENDPOINT:
        required: true
      Q_API_TOKEN:
        required: true

jobs:
  run-scenario-test:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./scenario-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          repository: oqtopus-team/test-suite
          ref: ${{ inputs.ref || github.sha }}

      - name: Show target device
        run: echo "DEVICE_ID=${{ inputs.device_id || vars.DEVICE_ID }}"

      - name: Install Task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin" v3.49.1
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install runn
        uses: k1LoW/gh-setup@v1
        with:
           repo: k1LoW/runn
           version: v1.8.2

      - name: Run scenario tests (non-SSE)
        env:
          USER_API_ENDPOINT: ${{ secrets.USER_API_ENDPOINT }}
          Q_API_TOKEN: ${{ secrets.Q_API_TOKEN }}
          DEVICE_ID: ${{ inputs.device_id || vars.DEVICE_ID }}
        run: |
          task runn-non-sse
