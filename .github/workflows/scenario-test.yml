name: Scenario Test

on:
    workflow_dispatch:
    schedule:
        - cron: "*/10 * * * *"
    pull_request:

jobs:
    run-scenario-test:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./scenario-tests
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: 1.24.9
                  cache: true

            - name: Install runn
              run: go install github.com/k1LoW/runn/cmd/runn@latest

            - name: Install Task
              uses: go-task/setup-task@v1

            - name: Run all scenario tests
              env:
                  USER_API_ENDPOINT: ${{ secrets.USER_API_ENDPOINT }}
                  Q_API_TOKEN: ${{ secrets.Q_API_TOKEN }}
              run: task runn-all-wo-env
