name: E2E Test

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
        description: "Git ref of oqtopus-team/test-suite to check out (defaults to the SHA of the triggering event)"
      signup_blocked:
        type: string
        required: false
        description: "Set to 'true' to run the signup-blocked check (defaults to vars.E2E_SIGNUP_BLOCKED)"
      device_id:
        type: string
        required: false
        description: "Device ID to target (defaults to vars.DEVICE_ID)"
    secrets:
      USER_API_ENDPOINT:
        required: true
      Q_API_TOKEN:
        required: true
      E2E_BASE_URL:
        required: true
      E2E_EMAIL:
        required: true
      E2E_PASSWORD:
        required: true
      E2E_TOTP_SECRET:
        required: true
  workflow_dispatch:
  pull_request:

jobs:
  run-e2e-test:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./e2e
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_TOTP_SECRET: ${{ secrets.E2E_TOTP_SECRET }}
      USER_API_ENDPOINT: ${{ secrets.USER_API_ENDPOINT }}
      Q_API_TOKEN: ${{ secrets.Q_API_TOKEN }}
      E2E_SIGNUP_BLOCKED: ${{ inputs.signup_blocked || vars.E2E_SIGNUP_BLOCKED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          repository: oqtopus-team/test-suite
          ref: ${{ inputs.ref || github.sha }}

      - name: Show target device
        run: echo "DEVICE_ID=${{ inputs.device_id || vars.DEVICE_ID }}"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify required secrets
        run: |
          : "${E2E_BASE_URL:?E2E_BASE_URL is not set}"
          : "${E2E_EMAIL:?E2E_EMAIL is not set}"
          : "${E2E_PASSWORD:?E2E_PASSWORD is not set}"
          : "${E2E_TOTP_SECRET:?E2E_TOTP_SECRET is not set}"
          : "${USER_API_ENDPOINT:?USER_API_ENDPOINT is not set}"
          : "${Q_API_TOKEN:?Q_API_TOKEN is not set}"

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: e2e/test-results
          retention-days: 7
