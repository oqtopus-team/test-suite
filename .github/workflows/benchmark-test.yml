name: Benchmark Test

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
        description: "Git ref of oqtopus-team/test-suite to check out (defaults to the SHA of the triggering event)"
      device_id:
        type: string
        required: false
        description: "Device ID to target (defaults to vars.DEVICE_ID)"
    secrets:
      USER_API_ENDPOINT:
        required: true
      Q_API_TOKEN:
        required: true
  workflow_dispatch:
  pull_request:

jobs:
  run-benchmark-test:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./benchmark-tests
    env:
      USER_API_ENDPOINT: ${{ secrets.USER_API_ENDPOINT }}
      Q_API_TOKEN: ${{ secrets.Q_API_TOKEN }}
      DEVICE_ID: ${{ inputs.device_id || vars.DEVICE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          repository: oqtopus-team/test-suite
          ref: ${{ inputs.ref || github.sha }}

      - name: Show target device
        run: echo "DEVICE_ID=${{ inputs.device_id || vars.DEVICE_ID }}"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: benchmark-tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify required secrets
        run: |
          : "${USER_API_ENDPOINT:?USER_API_ENDPOINT is not set}"
          : "${Q_API_TOKEN:?Q_API_TOKEN is not set}"

      - name: Run benchmark tests
        run: npx playwright test

      - name: Render measured-vs-threshold chart
        if: always()
        run: npm run chart

      - name: Upload error-rate chart
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-error-rate-chart
          path: |
            benchmark-tests/results/error-rate-chart.svg
            benchmark-tests/results/error-rate.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-playwright-report
          path: benchmark-tests/playwright-report
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-playwright-test-results
          path: benchmark-tests/test-results
          retention-days: 7
