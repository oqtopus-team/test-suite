version: "3"

dotenv:
  - "../profiles/{{.PROFILE}}.env"
  - ".env"

tasks:
  install:
    desc: "install npm deps and Playwright browsers"
    cmds:
      - npm install
      - npx playwright install --with-deps
  test:
    desc: "run all benchmark tests"
    cmds:
      - npx playwright test {{.CLI_ARGS}}
  report:
    desc: "open the last HTML report"
    cmds:
      - npx playwright show-report
