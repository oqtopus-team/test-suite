version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  commands:
    # Install dependencies
    - pip install -e .[dev]
    # Copy assets
    - mkdir -p docs/scenario-tests/asset
    - cp -r scenario-tests/asset/* docs/scenario-tests/asset/
    # Verify logo exists
    - ls -la docs/asset/oqtopus-logo.png
    # Build documentation
    - mkdocs build --site-dir $READTHEDOCS_OUTPUT/html --verbose
